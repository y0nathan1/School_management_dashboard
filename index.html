<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Management System</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">School Management</h1>
        <p class="app__subtitle">Manage students and classes in one place.</p>
      </header>

      <section class="dashboard" aria-label="Summary">
        <div class="dashboard__cards">
          <div class="card card--stat">
            <div class="stat__label">Students</div>
            <div class="stat__value" id="statStudents">0</div>
          </div>
          <div class="card card--stat">
            <div class="stat__label">Classes</div>
            <div class="stat__value" id="statClasses">0</div>
          </div>
          <div class="card card--stat card--actions">
            <button class="form__button" id="exportButton" type="button">Export data</button>
            <button class="form__button form__button--secondary" id="importButton" type="button">Import data</button>
            <button class="form__button form__button--secondary" id="resetButton" type="button">Reset data</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel__column">
          <div class="card">
            <h2 class="card__title" id="studentFormTitle">Add Student</h2>
            <form id="studentForm" class="form">
              <label class="form__label" for="studentName">Name</label>
              <input id="studentName" class="form__input" type="text" required />
              <label class="form__label" for="studentGrade">Grade</label>
              <select id="studentGrade" class="form__input" required>
                <option value="">Select grade</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
              </select>
              <label class="form__label" for="studentClass">Class</label>
              <input
                id="studentClass"
                class="form__input"
                list="classOptions"
                type="text"
                placeholder="e.g. Math"
                required
              />
              <datalist id="classOptions"></datalist>
              <div class="form__actions">
                <button class="form__button" type="submit">Add student</button>
                <button class="form__button form__button--secondary form__button--hidden" type="button" id="studentCancel">Cancel</button>
              </div>
            </form>
          </div>

          <div class="card">
            <h2 class="card__title" id="classFormTitle">Add Class</h2>
            <form id="classForm" class="form">
              <label class="form__label" for="className">Class name</label>
              <input id="className" class="form__input" type="text" placeholder="e.g. Science" required />
              <label class="form__label" for="classTeacher">Teacher</label>
              <input id="classTeacher" class="form__input" type="text" placeholder="e.g. Mr. Smith" required />
              <div class="form__actions">
                <button class="form__button" type="submit">Add class</button>
                <button class="form__button form__button--secondary form__button--hidden" type="button" id="classCancel">Cancel</button>
              </div>
            </form>
          </div>
        </div>

        <div class="panel__column">
          <div class="card">
            <div class="card__header">
              <h2 class="card__title">Students</h2>
              <input
                id="studentSearch"
                class="form__input form__input--search"
                type="search"
                placeholder="Search students..."
                aria-label="Search students"
              />
            </div>
            <ul id="studentList" class="list"></ul>
          </div>
          <div class="card">
            <div class="card__header">
              <h2 class="card__title">Classes</h2>
              <input
                id="classSearch"
                class="form__input form__input--search"
                type="search"
                placeholder="Search classes..."
                aria-label="Search classes"
              />
            </div>
            <ul id="classList" class="list"></ul>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p>© 2026 School Management Dashboard — Built with vanilla HTML, CSS & JavaScript • Data stored locally.</p>
      </footer>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js" defer></script>
  </body>
</html>
